<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Saved Records</h1>

    <a href="/">← Back to Home</a>

    <table border="1" width="100%" style="margin-top:20px;">
        <tr>
            <th>ID</th>
            <th>Input</th>
            <th>Keywords</th>
            <th>Summary</th>
        </tr>

        {% for row in records %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
